apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: app
type: Opaque
# Demonstrates the Secret pattern required by the assignment.
# In a real app this would hold DB passwords, API keys, tokens etc.
# stringData accepts plain text — Kubernetes base64-encodes it automatically.
stringData:
  APP_SECRET_KEY: "replace-with-a-real-secret-in-production"
