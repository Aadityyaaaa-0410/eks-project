server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /health and /api/* to the backend service.
    # In Kubernetes: Service "backend-service" in namespace "app"
    # In Docker Compose: container name "backend" (override via env if needed)
    location /health {
        proxy_pass http://backend-service:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
